{% set name = "tranquilo" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tranquilo-{{ version }}.tar.gz
  sha256: 54a03184f12f67ba82342eb58773febc54b613e2b56b384c1b785e71d51fe454

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - joblib
    - numba
    - numpy >=1.17.0
    - pandas
    - scipy >=1.2.1

test:
  imports:
    - tranquilo
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/OpenSourceEconomics/tranquilo
  summary: Trust-region optimizer for scalar, least-square and noisy problems
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - janosg
    - timmens
